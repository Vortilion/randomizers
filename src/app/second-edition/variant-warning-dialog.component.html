<ng-container *transloco="let t; read: 'second-edition.modals.variant-warning'">
  <h2 mat-dialog-title>
    {{ t('title') }}
  </h2>
  <mat-dialog-content>
    {{ t('content') }}
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button mat-dialog-close>Ok</button>
  </mat-dialog-actions>
</ng-container>
