<ng-container *transloco="let t; read: 'dashboard'">
  <div class="dashboard flex min-h-screen flex-col">
    <header class="dashboard__hero px-4 py-6 xSmall:px-8 xSmall:py-8">
      <div class="dashboard__topbar mb-8 flex items-start justify-between gap-4">
        <div>
          <h1 class="dashboard__title text-4xl xSmall:text-5xl">{{ t('title') }}</h1>
          <p class="dashboard__subtitle mt-3 max-w-3xl text-base xSmall:text-lg">
            {{ t('subtitle') }}
          </p>
        </div>
        <app-language-selector />
      </div>
    </header>

    <main class="flex-1 px-4 pb-8 xSmall:px-8">
      <div class="grid gap-4 lg:grid-cols-2">
        <mat-card
          class="dashboard-card"
          (click)="navigate('/gwt-argentina')"
          (keydown.enter)="navigate('/gwt-argentina')"
          (keydown.space)="navigate('/gwt-argentina'); $event.preventDefault()"
        >
          <mat-card-header>
            <mat-card-title>{{ t('argentina.title') }}</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <p>{{ t('argentina.description') }}</p>
          </mat-card-content>
        </mat-card>

        <mat-card
          class="dashboard-card"
          (click)="navigate('/gwt-2nd-edition')"
          (keydown.enter)="navigate('/gwt-2nd-edition')"
          (keydown.space)="navigate('/gwt-2nd-edition'); $event.preventDefault()"
        >
          <mat-card-header>
            <mat-card-title>{{ t('second-edition.title') }}</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <p>{{ t('second-edition.description') }}</p>
          </mat-card-content>
        </mat-card>

        <mat-card
          class="dashboard-card"
          (click)="navigate('/gwt-new-zealand')"
          (keydown.enter)="navigate('/gwt-new-zealand')"
          (keydown.space)="navigate('/gwt-new-zealand'); $event.preventDefault()"
        >
          <mat-card-header>
            <mat-card-title>{{ t('new-zealand.title') }}</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <p>{{ t('new-zealand.description') }}</p>
          </mat-card-content>
        </mat-card>
      </div>
    </main>

    <app-page-footer />
  </div>
</ng-container>
